<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />

    <title>Perfil | Trocso</title>

    <link rel="shortcut icon" href="../../medias/imgs/logo-trocso.png" />

    <link rel="stylesheet" href="../../styles/profile/index.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />  
    <script
      src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"
      defer
    ></script>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js" defer></script>
  </head>
  <body>
    <main class="profile">
      <aside class="sidebar">
        <a href="../../../index.html" class="link__back">
          <i class="bi bi-arrow-left"></i>
          Voltar
        </a>

        <header class="sidebar__header">
          <img src="../../medias/imgs/logo-trocso.png" alt="" />
          <h2>Trocso</h2>
        </header>

        <nav class="sidebar__nav">
          <a href="page.html" class="sidebar__link active">
            <i class="bi bi-person"></i>
            <span>Meu Perfil</span>
          </a>

          <a href="../configurations/page.html" class="sidebar__link">
            <i class="bi bi-gear"></i>
            <span>Configurações</span>
          </a>
        </nav>
      </aside>

      <section class="profile__content">
        <div class="profile__top">
          <div class="profile__title">
            <h1>Meu Perfil</h1>
            <p>Gerencie suas informações pessoais e configurações.</p>
          </div>
        </div>
        <div class="profile__grid" id="profile__content">
          <div class="profile__card">
            <div class="profile__banner">
              <button class="button__edit" id="button-edit">
                <i class="bi bi-pencil"></i>
              </button>
              <picture class="profile__avatar">
                <img src="https://i.pravatar.cc/300" alt="Foto do usuário" />
              </picture>
            </div>

            <div class="profile__body">
              <h2>Jhon Doe</h2>
              <span>jhon_doe</span>

              <p>
                Explore, personalize e gerencie sua conta dentro da plataforma.
              </p>

              <div class="profile__infos">
                <div class="profile__info">
                  <h3>E-mail</h3>
                  <strong>jhondoe@email.com</strong>
                </div>

                <div class="profile__info">
                  <h3>Localização</h3>
                  <strong>Cidade, País</strong>
                </div>

                <div class="profile__info">
                  <h3>Membro desde</h3>
                  <strong>2024</strong>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script
      type="module"
      src="../../scripts/components/profile/profile.js"
    ></script>
    <script
      type="module"
      src="../../scripts/components/profile/edit_profile.js"
    ></script>
  </body>
</html>
