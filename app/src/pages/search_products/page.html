<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="../../medias/imgs/logo-trocso.png"
      type="image/x-icon"
    />
    <title>Resultados | Trocso</title>
    <link rel="stylesheet" href="../../styles/products/index.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <script
      src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"
      defer
    ></script>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js" defer></script>
  </head>
  <body>
    <main class="search">
      <header class="search__header">
        <a href="../../../index.html" class="search__logo">
          <img src="../../medias/imgs/logo-trocso.png" alt="" />
          <h2>Trocso</h2>
        </a>

        <div class="search__topbar">
          <div class="topbar__search input-group">
            <i class="bi bi-search input-group-text"></i>

            <input
              type="text"
              class="form-control"
              placeholder="O que você está procurando?"
              id="search_products"
            />

            <span class="input-group-text"> BR </span>
          </div>
        </div>
      </header>

      <section class="search__hero">
        <span class="search__badge"> Resultados da busca </span>

        <h1>
          Encontramos
          <span>0 produtos</span>
        </h1>

        <p>
          Explore anúncios publicados pela comunidade e encontre algo
          interessante para trocar.
        </p>
      </section>

      <section class="search_results">
        <div class="empty__results">
          <div class="empty__icon">
            <i class="bi bi-search"></i>
          </div>

          <h3>Nenhum produto encontrado</h3>

          <p>
            Não encontramos anúncios para sua pesquisa. Tente usar palavras
            diferentes ou navegar pelas categorias.
          </p>
        </div>
      </section>
    </main>
    <script type="module" src="../../scripts/components/search_products/search_products.js"></script>
  </body>
</html>
