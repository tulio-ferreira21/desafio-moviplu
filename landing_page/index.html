<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trocso</title>

    <link
      rel="shortcut icon"
      href="./src/imgs/logo-trocso.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./src/styles/landing/index.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>

  <body>
    <main class="landing">
      <header class="landing__header">
        <div class="landing__header__left">
          <img src="./src/imgs/logo-trocso.png" alt="Logo Trocso" />

          <h2>Trocso</h2>
        </div>

        <nav class="landing__nav">
          <a href="#">Como funciona</a>
          <a href="#">Categorias</a>
          <a href="#">Sobre nós</a>
          <a href="#">Para vender</a>
        </nav>

        <div class="landing__header__right" class="hero__primary">
          <a href="https://auth-trocso.vercel.app/">
            <!-- <a href="./src/pages/signIn/page.html" class="hero__primary" -->
            Entrar</a
          >

          <div class="landing__menu">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </header>

      <section class="hero">
        <div class="hero__left">
          <h1>
            Troque.
            <span>Renove.</span>
            Transforme.
          </h1>

          <p>
            A Trocso é o espaço para dar um novo destino ao que faz sentido pra
            você.
          </p>

          <div class="hero__buttons">
            <a href="https://trocso-platform.vercel.app/" class="hero__primary" >
              <!-- <a href="./src/pages/explore/page.html" class="hero__primary" -->
              Explorar agora
            </a>

            <button class="hero__secondary">Como funciona</button>
          </div>
        </div>
      </section>

      <section class="hero__bottom">
        <div class="hero__card__wrapper">
          <div class="hero__card">
            <div class="hero__icon purple">↺</div>

            <div>
              <h3>Livre-se com facilidade</h3>
            </div>
          </div>

          <div class="hero__card">
            <div class="hero__icon green">⌘</div>

            <div>
              <h3>Consumo mais consciente</h3>
            </div>
          </div>

          <div class="hero__card">
            <div class="hero__icon yellow">♡</div>

            <div>
              <h3>Coisas ganham novas histórias</h3>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
